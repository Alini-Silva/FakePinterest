{% extends "homepage.html" %}


{% block body %}
{% include "navbar.html" %}

<body>
    <h1 class="titulo">Feed</h1>

    {% for foto in fotos %}
    <a href="{{ url_for('perfil', id_usuario=foto.id_usuario) }}">
        <img src="{{ url_for('static', filename='fotos_posts/{}'.format(foto.imagem)) }}"></a>
    {% endfor%}

</body>
{% endblock %}
